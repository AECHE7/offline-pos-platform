name: Build Android APK

on:
  workflow_dispatch: # Allows the user to click a button to build the app
  push:
    branches: [ main ] # Auto-builds when code is updated

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalPOS-Android-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
